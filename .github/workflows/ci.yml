name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Check & Clippy & Fmt & Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check
      # Unit tests (arg parsing, runner classification, nextest helpers) — no
      # network or installed toolchain required.
      - run: cargo test --bins

  integration:
    name: Integration tests (online install + nextest)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # cargo-nextest is needed for the end-to-end nextest handshake test
      # (nextest_online_install_and_run); it skips itself if absent.
      - uses: taiki-e/install-action@nextest
      - name: Run integration tests
        run: cargo test --test integration -- --nocapture
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
